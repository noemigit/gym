<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GYM.LOG</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080809;--sur:#0f0f11;--card:#161619;--card2:#1c1c20;
  --b:#252529;--b2:#2e2e34;
  --a:#E8624A;--a2:#F0884A;--a3:#4A9BE8;--a4:#9B4EC8;
  --acc:#c8f04a;
  --t:#f0f0f2;--t2:#9090a0;--t3:#505058;
  --r:13px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;font-size:15px;padding-bottom:140px;}

/* ── HEADER ── */
.hdr{padding:16px 18px 12px;border-bottom:1px solid var(--b);position:sticky;top:0;background:rgba(8,8,9,.94);backdrop-filter:blur(16px);z-index:200;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.5px;}
.logo span{color:var(--acc);}
.hdr-btns{display:flex;gap:8px;}
.hdr-btn{font-size:11px;font-weight:500;color:var(--t2);background:var(--card);border:1px solid var(--b);padding:5px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;}

/* ── SCREENS ── */
.screen{display:none;}.screen.active{display:block;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(8,8,9,.96);border-top:1px solid var(--b);display:flex;z-index:300;backdrop-filter:blur(12px);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--t3);font-size:10px;font-weight:600;letter-spacing:.5px;transition:color .15s;}
.bnav-btn.active{color:var(--acc);}
.bnav-ico{font-size:18px;}

/* ── DAY TABS ── */
.dtabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--b);background:var(--bg);position:sticky;top:49px;z-index:190;}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;padding:7px 13px;border-radius:8px;border:1px solid var(--b);background:var(--card);color:var(--t3);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.dtab.d0.on{background:var(--a);border-color:var(--a);color:#fff;}
.dtab.d1.on{background:var(--a3);border-color:var(--a3);color:#fff;}
.dtab.d2.on{background:var(--a4);border-color:var(--a4);color:#fff;}
.dtab.d3.on{background:#48B87A;border-color:#48B87A;color:#fff;}

/* ── DAY CONTENT ── */
.daybody{display:none;padding:16px 16px 48px;max-width:600px;margin:0 auto;}
.daybody.on{display:block;}
.day-hero{padding:4px 0 16px;}
.day-emoji{font-size:22px;margin-bottom:4px;}
.day-name{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;line-height:1.1;margin-bottom:6px;}
.day-desc{font-size:12px;color:var(--t2);line-height:1.6;padding-left:10px;border-left:2px solid var(--b2);}

/* ── PROGRESS ── */
.prow{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.pbar{flex:1;height:3px;background:var(--b);border-radius:2px;overflow:hidden;}
.pfill{height:100%;border-radius:2px;transition:width .4s ease;width:0%;}
.ptxt{font-size:11px;color:var(--t3);white-space:nowrap;font-weight:500;min-width:28px;text-align:right;}

/* ── EXERCISE CARD ── */
.exc{background:var(--card);border:1px solid var(--b);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .15s;}
.exc.glute{border-left:2px solid var(--a);}
.exc.alldone{border-color:rgba(200,240,74,.25);}
.exh{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;}
.exn{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--t3);width:22px;height:22px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s;}
.exn:hover{border-color:var(--acc);color:var(--acc);}
.exn.exndone{background:var(--acc);border-color:var(--acc);color:#000;}
.exc.alldone{background:rgba(200,240,74,.04);border-color:rgba(200,240,74,.25);}
.exc.alldone .exname{color:var(--acc);}
.exi{flex:1;min-width:0;}
.exname{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exmeta{font-size:11px;color:var(--t2);}
.exr{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.gtag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(232,98,74,.15);color:var(--a);letter-spacing:.5px;}
.badge{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--card2);color:var(--t3);min-width:30px;text-align:center;}
.badge.ok{background:rgba(200,240,74,.15);color:var(--acc);}
.chev{font-size:11px;color:var(--t3);transition:transform .2s;flex-shrink:0;}
.exc.open .chev{transform:rotate(180deg);}

/* ── PANEL ── */
.expanel{display:none;border-top:1px solid var(--b);}
.exc.open .expanel{display:block;}

/* ── VIDEO ── */
.exvideo{width:100%;height:160px;object-fit:contain;background:#000;border-bottom:1px solid var(--b);display:block;}

/* ── TIP ── */
.tip{padding:11px 14px;font-size:12px;line-height:1.65;border-bottom:1px solid var(--b);}
.tip.gen{background:rgba(74,155,232,.05);color:#8cc8ef;}
.tip.glu{background:rgba(232,98,74,.05);color:#e8a090;}
.tiplbl{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;opacity:.6;}

/* ── MUSCLE TAGS ── */
.mtags{display:flex;flex-wrap:wrap;gap:5px;padding:10px 14px;border-bottom:1px solid var(--b);}
.mtag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px;border:1px solid;opacity:.85;}

/* ── SETS ── */
.setswrap{padding:10px 14px;border-bottom:1px solid var(--b);}
.setsgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.setrow{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--sur);border:1px solid var(--b);border-radius:8px;transition:border-color .15s;}
.setrow.done{border-color:rgba(200,240,74,.3);background:rgba(200,240,74,.03);}
.setlbl{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--t3);flex-shrink:0;white-space:nowrap;}
.setrow.done .setlbl{color:var(--acc);}
/* font-size:16px evita el zoom de iOS al hacer focus */
.setw{flex:1;background:transparent;border:none;border-bottom:1px solid var(--b2);color:var(--t);font-family:'Syne',sans-serif;font-size:18px;font-weight:800;padding:1px 3px;outline:none;min-width:0;width:100%;}
.setw:focus{border-color:var(--acc);}
.setw::placeholder{color:var(--t3);font-weight:400;font-size:13px;}
.setunit{font-size:10px;color:var(--t3);flex-shrink:0;}
.setpr{font-size:9px;color:#F0884A;font-weight:700;display:none;}
.setrow.isnewpr .setpr{display:block;}
.setchk{width:24px;height:24px;border-radius:50%;border:2px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .15s;flex-shrink:0;}
.setrow.done .setchk{background:var(--acc);border-color:var(--acc);color:#000;}

/* ── LAST WEIGHT HINT ── */
.lasthint{font-size:10px;color:var(--t3);padding:4px 14px 0;font-style:italic;}

/* ── REST TIMER ── */
.rest{display:none;padding:10px 14px;background:rgba(200,240,74,.06);border-bottom:1px solid rgba(200,240,74,.12);align-items:center;gap:10px;}
.rest.show{display:flex;}
.restcd{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--acc);min-width:34px;}
.restlbl{font-size:11px;color:var(--t2);flex:1;}
.restskip{font-size:11px;color:var(--t3);cursor:pointer;padding:4px 8px;border-radius:4px;border:1px solid var(--b);background:var(--card);}

/* ── EXTRAS ── */
.extras{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.notein{width:100%;background:var(--sur);border:1px solid var(--b);border-radius:8px;padding:9px 11px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;resize:none;height:54px;line-height:1.5;}
.notein::placeholder{color:var(--t3);}
.ytrow{display:flex;gap:7px;}
.ytin{flex:1;background:var(--sur);border:1px solid var(--b);border-radius:8px;padding:9px 11px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;min-width:0;}
.ytin::placeholder{color:var(--t3);}
.ytgo{padding:9px 12px;border-radius:8px;border:none;background:#d00;color:#fff;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.ytlink{display:none;}.ytlink.on{display:block;}
.ytlink a{display:inline-flex;align-items:center;gap:5px;color:#ff5555;font-size:12px;text-decoration:none;padding:6px 11px;background:rgba(255,0,0,.07);border-radius:6px;border:1px solid rgba(255,0,0,.18);}

/* ── CARDIO ── */
.secdiv{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.secdiv::after{content:'';flex:1;height:1px;background:var(--b);}
.cardio{padding:12px 14px;background:var(--card);border:1px solid var(--b);border-radius:var(--r);display:flex;align-items:center;gap:12px;}
.cardio-ico{font-size:20px;}
.cardio-txt{font-size:12px;color:var(--t2);line-height:1.5;}
.cardio-txt strong{color:var(--t);display:block;font-size:13px;margin-bottom:1px;}

/* ── COMPLETION BANNER ── */
.compbanner{display:none;margin-top:16px;padding:16px;border-radius:var(--r);text-align:center;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#000;}
.compbanner.show{display:block;}

/* ── STATS SCREEN ── */
.statspad{padding:16px;max-width:600px;margin:0 auto;}
.stabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;}
.stabs::-webkit-scrollbar{display:none;}
.stab{flex-shrink:0;padding:7px 14px;border-radius:8px;border:1px solid var(--b);background:var(--card);color:var(--t3);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;}
.stab.on{background:var(--acc);border-color:var(--acc);color:#000;}

/* ── CALENDAR ── */
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.caltitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;text-transform:capitalize;}
.caln{width:28px;height:28px;border-radius:6px;border:1px solid var(--b);background:var(--card);color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}
.calday{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t3);}
.calday.hdr{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.calday.trained{color:#fff;font-weight:700;}
.calday.today{outline:1px solid var(--acc);color:var(--acc);}

/* ── PR LIST ── */
.pritem{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--b);}
.pritem:last-child{border-bottom:none;}
.prex{font-size:13px;}
.prday{font-size:10px;color:var(--t3);margin-top:2px;}
.prval{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#F0884A;}
.nodata{font-size:13px;color:var(--t3);text-align:center;padding:24px 0;}

/* ── HISTORY ── */
.hitem{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.hitem-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hitem-date{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;}
.hitem-day{font-size:11px;color:var(--t2);}
.hitem-exs{display:flex;flex-direction:column;gap:4px;}
.hex{display:flex;justify-content:space-between;font-size:12px;}
.hex-name{color:var(--t2);}
.hex-w{font-weight:700;color:var(--t);}

/* ── CHART ── */
.chsel{width:100%;background:var(--card);border:1px solid var(--b);border-radius:8px;padding:9px 11px;color:var(--t);font-size:14px;outline:none;margin-bottom:12px;}
.chartbox{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:12px;overflow-x:auto;}
.chartbox canvas{display:block;}

/* ── TIMER OVERLAY ── */
.toverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;}
.toverlay.show{display:flex;}
.tring{position:relative;width:180px;height:180px;margin-bottom:20px;}
.tring svg{position:absolute;inset:0;transform:rotate(-90deg);}
.tring-bg{fill:none;stroke:var(--b2);stroke-width:8;}
.tring-fg{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:502;stroke-dashoffset:0;transition:stroke-dashoffset .9s linear;}
.tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:52px;font-weight:800;}
.tlabel{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;}
.tmsg{font-size:12px;color:var(--t2);}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:var(--card);border:1px solid var(--b2);border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:20px 20px 40px;max-height:80vh;overflow-y:auto;}
.mhead{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.mclose{font-size:20px;cursor:pointer;color:var(--t2);}

/* ── TOAST ── */
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--acc);color:#000;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:9px 18px;border-radius:20px;z-index:999;transition:transform .3s ease;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── CONFETTI ── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:998;}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">GYM<span>.</span>LOG</div>
  <div class="hdr-btns">
    <div class="hdr-btn" onclick="exportCSV()">📥 Exportar</div>
  </div>
</div>

<!-- ══ WORKOUT SCREEN ══ -->
<div class="screen active" id="screenWorkout">
  <div class="dtabs" id="dtabs"></div>
  <div id="daycontents"></div>
</div>

<!-- ══ STATS SCREEN ══ -->
<div class="screen" id="screenStats">
  <div class="statspad">
    <div class="stabs">
      <div class="stab on" onclick="setTab('calendar')">📅 Calendario</div>
      <div class="stab" onclick="setTab('prs')">🏆 PRs</div>
      <div class="stab" onclick="setTab('history')">📋 Historial</div>
      <div class="stab" onclick="setTab('chart')">📈 Progresión</div>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

<!-- ══ BOTTOM NAV ══ -->
<div class="bnav">
  <div class="bnav-btn active" id="navWorkout" onclick="goScreen('workout')">
    <div class="bnav-ico">🏋️</div>HOY
  </div>
  <div class="bnav-btn" id="navStats" onclick="goScreen('stats')">
    <div class="bnav-ico">📊</div>PROGRESO
  </div>
</div>

<!-- ══ TIMER OVERLAY ══ -->
<div class="toverlay" id="toverlay" onclick="stopTimer()">
  <div class="tring">
    <svg viewBox="0 0 180 180"><circle class="tring-bg" cx="90" cy="90" r="80"/><circle class="tring-fg" id="tringfg" cx="90" cy="90" r="80"/></svg>
    <div class="tnum" id="tnum">30</div>
  </div>
  <div class="tlabel" id="tlabel">Descanso</div>
  <div class="tmsg">Toca para cerrar</div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>
<canvas id="confetti-canvas"></canvas>

// ══ STORAGE ══
function ld(){try{return JSON.parse(localStorage.getItem("gymlog_v3")||"{}");}catch(e){return{};}}
function sd(d){localStorage.setItem("gymlog_v3",JSON.stringify(d));}
function lh(){try{return JSON.parse(localStorage.getItem("gymlog_hist")||"[]");}catch(e){return[];}}
function sh(h){localStorage.setItem("gymlog_hist",JSON.stringify(h));}

var appData = ld();

function gk(di,ei,t,si){
  if(t==="w") return "d"+di+"_e"+ei+"_s"+si+"_w";
  if(t==="n") return "d"+di+"_e"+ei+"_n";
  if(t==="yt") return "d"+di+"_e"+ei+"_yt";
  if(t==="done") return "d"+di+"_e"+ei+"_done";
}

function parseSets(str){
  if(str.includes("máx")) return Array(4).fill({reps:"máx"});
  var parts = str.split("×").map(function(s){return s.trim();});
  var cnt = parseInt(parts[0]);
  var rl = parts[1].split("-");
  var out = [];
  for(var i=0;i<cnt;i++) out.push({reps: rl[i]||rl[rl.length-1]});
  return out;
}

// ══ GET LAST WEIGHT FROM HISTORY (persistent across weeks) ══
function getLastWeight(exName, si){
  var h = lh();
  for(var i=0;i<h.length;i++){
    var sess = h[i];
    for(var j=0;j<sess.exercises.length;j++){
      var ex = sess.exercises[j];
      if(ex.name===exName && ex.weights && ex.weights[si] && parseFloat(ex.weights[si])>0){
        return ex.weights[si];
      }
    }
  }
  return null;
}

// ══ GET PR FROM HISTORY ══
function getPR(exName){
  var h = lh();
  var best = 0;
  for(var i=0;i<h.length;i++){
    var sess = h[i];
    for(var j=0;j<sess.exercises.length;j++){
      var ex = sess.exercises[j];
      if(ex.name===exName && ex.maxWeight && ex.maxWeight>best) best=ex.maxWeight;
    }
  }
  return best||null;
}

// ══ SAVE SESSION TO HISTORY ══
function saveSession(di){
  var day = DAYS[di];
  var h = lh();
  var today = new Date().toISOString().split('T')[0];
  if(h.some(function(s){return s.date===today&&s.dayId===di;})) return;
  var exercises = day.exercises.map(function(ex,ei){
    var ws = [];
    parseSets(ex.sets).forEach(function(_,si){
      var w = appData[gk(di,ei,"w",si)];
      if(w) ws.push(w);
    });
    var mx = ws.length ? Math.max.apply(null, ws.map(function(w){return parseFloat(w)||0;})) : null;
    return {name:ex.name, weights:ws, maxWeight:mx};
  });
  h.unshift({date:today, dayId:di, dayLabel:day.label, dayTitle:day.title, color:day.color, exercises:exercises});
  sh(h);
}

// ══ TIMER ══
var timerInt=null, timerSec=0, timerTotal=30;
var CIRC = 2*Math.PI*80;

function startTimer(sec, label, color){
  stopTimer();
  timerSec=sec; timerTotal=sec;
  document.getElementById("tlabel").textContent=label;
  document.getElementById("tringfg").style.stroke=color;
  document.getElementById("tringfg").style.strokeDasharray=CIRC;
  document.getElementById("toverlay").classList.add("show");
  updateTimer();
  timerInt=setInterval(function(){
    timerSec--;
    updateTimer();
    if(timerSec<=0){
      stopTimer();
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
    }
  },1000);
}
function updateTimer(){
  document.getElementById("tnum").textContent=timerSec;
  var offset = CIRC*(1-(timerSec/timerTotal));
  document.getElementById("tringfg").style.strokeDashoffset=offset;
}
function stopTimer(){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  document.getElementById("toverlay").classList.remove("show");
}

function countDone(di){
  var n=0;
  DAYS[di].exercises.forEach(function(ex,ei){
    if(appData[gk(di,ei,"done",0)]) n++;
  });
  return n;
}

function switchDay(di){
  document.querySelectorAll(".dtab").forEach(function(t,i){t.classList.toggle("on",i===di);});
  document.querySelectorAll(".daybody").forEach(function(d,i){d.classList.toggle("on",i===di);});
}

function toggleEx(di,ei){
  var card = document.getElementById("exc"+di+"_"+ei);
  card.classList.toggle("open");
}

function onWChange(di,ei,si){
  var val = document.getElementById("sw"+di+"_"+ei+"_"+si).value;
  appData[gk(di,ei,"w",si)] = val;
  sd(appData);
  // Check if new PR
  var pr = getPR(DAYS[di].exercises[ei].name);
  var row = document.getElementById("sr"+di+"_"+ei+"_"+si);
  if(val && pr && parseFloat(val)>pr){
    row.classList.add("isnewpr");
  } else {
    row.classList.remove("isnewpr");
  }
}

function toggleSet(di,ei,si){
  var ex = DAYS[di].exercises[ei];
  var sets = parseSets(ex.sets);
  var w = document.getElementById("sw"+di+"_"+ei+"_"+si).value||"";

  // Save weight
  if(w){ appData[gk(di,ei,"w",si)]=w; }

  // Count how many sets have weight entered
  var filledSets = 0;
  sets.forEach(function(_,s){
    if(appData[gk(di,ei,"w",s)]) filledSets++;
  });

  // Mark exercise done when all sets have weight or user taps last set
  var allDone = filledSets >= sets.length;
  appData[gk(di,ei,"done",0)] = allDone;
  sd(appData);

  // Update set row visual
  var row = document.getElementById("sr"+di+"_"+ei+"_"+si);
  if(w) row.classList.add("done"); else row.classList.remove("done");

  // Update badge - count filled sets
  var badge = document.getElementById("bd"+di+"_"+ei);
  badge.textContent = filledSets+"/"+sets.length;
  badge.className = "badge"+(allDone?" ok":"");

  // Update card
  var card = document.getElementById("exc"+di+"_"+ei);
  card.classList.toggle("alldone", allDone);

  // Check PR - only toast if strictly greater than existing PR
  if(w && parseFloat(w)>0){
    var pr = getPR(ex.name);
    if(pr && parseFloat(w)>pr){
      toast("🏆 Nuevo PR: "+w+" kg!");
    }
  }

  // Start rest timer — 30 seconds
  startTimer(30, "Descanso · "+ex.name, DAYS[di].color);

  // Update progress
  updateProg(di);

  // Save to history if all exercises done
  var done = countDone(di);
  if(done===DAYS[di].exercises.length){
    saveSession(di);
    showConfetti(DAYS[di].color);
    var comp = document.getElementById("comp"+di);
    if(comp) comp.classList.add("show");
  }
}

function updateProg(di){
  var done = countDone(di);
  var total = DAYS[di].exercises.length;
  var pct = Math.round(done/total*100);
  var pf = document.getElementById("pf"+di);
  var pt = document.getElementById("pt"+di);
  if(pf) pf.style.width=pct+"%";
  if(pt) pt.textContent=done+"/"+total;
}

// ══ STATS ══
var activeTab="calendar";
function goScreen(s){
  document.getElementById("screenWorkout").classList.toggle("active",s==="workout");
  document.getElementById("screenStats").classList.toggle("active",s==="stats");
  document.getElementById("navWorkout").classList.toggle("active",s==="workout");
  document.getElementById("navStats").classList.toggle("active",s==="stats");
  if(s==="stats") renderTab();
}

function setTab(t){
  activeTab=t;
  document.querySelectorAll(".stab").forEach(function(el,i){
    el.classList.toggle("on",["calendar","prs","history","chart"][i]===t);
  });
  renderTab();
}

function renderTab(){
  if(activeTab==="calendar") renderCalendar();
  else if(activeTab==="prs") renderPRs();
  else if(activeTab==="history") renderHistory();
  else if(activeTab==="chart") renderChart();
}

var calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

function renderCalendar(){
  var h=lh();
  var trainedDates={};
  h.forEach(function(s){trainedDates[s.date]={color:s.color};});

  var firstDay=new Date(calYear,calMonth,1).getDay();
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var today=new Date().toISOString().split('T')[0];
  var months=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  var html='<div class="calhead">';
  html+='<div class="caln" onclick="calNav(-1)">‹</div>';
  html+='<div class="caltitle">'+months[calMonth]+" "+calYear+'</div>';
  html+='<div class="caln" onclick="calNav(1)">›</div>';
  html+='</div><div class="calgrid">';

  ["L","M","X","J","V","S","D"].forEach(function(d){
    html+='<div class="calday hdr">'+d+'</div>';
  });

  var startOffset=(firstDay+6)%7;
  for(var i=0;i<startOffset;i++) html+='<div class="calday"></div>';

  for(var d=1;d<=daysInMonth;d++){
    var dateStr=calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    var trained=trainedDates[dateStr];
    var isToday=dateStr===today;
    var style=trained?"background:"+trained.color+";border-radius:6px":"";
    html+='<div class="calday'+(isToday?" today":"")+'" style="'+style+'">'+(trained?'<span style="filter:drop-shadow(0 0 2px rgba(0,0,0,.5))">'+d+'</span>':d)+'</div>';
  }
  html+='</div>';

  // Training count this month
  var monthCount=Object.keys(trainedDates).filter(function(d){return d.startsWith(calYear+"-"+String(calMonth+1).padStart(2,"0"));}).length;
  html+='<div style="font-size:12px;color:var(--t2);text-align:center;padding:8px 0">'+monthCount+' entrenamientos este mes</div>';

  document.getElementById("tabContent").innerHTML=html;
}

function calNav(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function renderPRs(){
  var html='';
  var found=false;
  DAYS.forEach(function(day,di){
    day.exercises.forEach(function(ex){
      var pr=getPR(ex.name);
      if(pr){
        found=true;
        html+='<div class="pritem"><div><div class="prex">'+ex.name+'</div><div class="prday">'+day.label+'</div></div><div class="prval">'+pr+' kg</div></div>';
      }
    });
  });
  document.getElementById("tabContent").innerHTML=found?html:'<div class="nodata">Completa series con peso para ver tus PRs aquí.</div>';
}

function renderHistory(){
  var h=lh();
  if(!h.length){document.getElementById("tabContent").innerHTML='<div class="nodata">Aún no hay sesiones guardadas.</div>';return;}
  var html='';
  h.slice(0,20).forEach(function(sess){
    html+='<div class="hitem">';
    html+='<div class="hitem-head"><div class="hitem-date" style="color:'+sess.color+'">'+sess.date+'</div><div class="hitem-day">'+sess.dayLabel+' — '+sess.dayTitle+'</div></div>';
    html+='<div class="hitem-exs">';
    sess.exercises.forEach(function(ex){
      if(ex.weights&&ex.weights.length){
        html+='<div class="hex"><span class="hex-name">'+ex.name+'</span><span class="hex-w">'+(ex.maxWeight||ex.weights[0])+' kg</span></div>';
      }
    });
    html+='</div></div>';
  });
  document.getElementById("tabContent").innerHTML=html;
}

function renderChart(){
  var h=lh();
  var exNames=[];
  DAYS.forEach(function(day){
    day.exercises.forEach(function(ex){
      if(exNames.indexOf(ex.name)===-1) exNames.push(ex.name);
    });
  });

  var html='<select class="chsel" id="chsel" onchange="drawChart()">';
  exNames.forEach(function(n){html+='<option value="'+n+'">'+n+'</option>';});
  html+='</select><div class="chartbox"><canvas id="chartcanvas" height="180"></canvas></div>';
  document.getElementById("tabContent").innerHTML=html;
  drawChart();
}

function drawChart(){
  var sel=document.getElementById("chsel");
  if(!sel) return;
  var exName=sel.value;
  var h=lh();
  var points=[];
  h.slice().reverse().forEach(function(sess){
    var ex=sess.exercises.find(function(e){return e.name===exName;});
    if(ex&&ex.maxWeight) points.push({date:sess.date,val:ex.maxWeight});
  });

  var canvas=document.getElementById("chartcanvas");
  if(!canvas) return;
  canvas.width=canvas.parentElement.offsetWidth-24;
  var ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!points.length){ctx.fillStyle="#505058";ctx.font="12px DM Sans";ctx.fillText("Sin datos para este ejercicio",10,90);return;}

  var vals=points.map(function(p){return p.val;});
  var mn=Math.min.apply(null,vals), mx2=Math.max.apply(null,vals);
  var pad={t:20,r:20,b:30,l:40};
  var w=canvas.width-pad.l-pad.r, h2=canvas.height-pad.t-pad.b;

  // Grid
  ctx.strokeStyle="#252529";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){
    var y=pad.t+h2*(1-i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+w,y);ctx.stroke();
    ctx.fillStyle="#505058";ctx.font="10px DM Sans";
    ctx.fillText(Math.round(mn+(mx2-mn)*i/4),2,y+4);
  }

  // Line
  ctx.beginPath();ctx.strokeStyle="#E8624A";ctx.lineWidth=2;
  points.forEach(function(p,i){
    var x=pad.l+(i/(points.length-1||1))*w;
    var y=pad.t+h2*(1-(p.val-mn)/(mx2-mn||1));
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Dots
  points.forEach(function(p,i){
    var x=pad.l+(i/(points.length-1||1))*w;
    var y=pad.t+h2*(1-(p.val-mn)/(mx2-mn||1));
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle="#E8624A";ctx.fill();
  });
}

// ══ CONFETTI ══
function showConfetti(color){
  var canvas=document.getElementById("confetti-canvas");
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  var ctx=canvas.getContext("2d");
  var particles=[];
  for(var i=0;i<80;i++){
    particles.push({
      x:Math.random()*canvas.width,y:-10,
      vx:(Math.random()-0.5)*4,vy:Math.random()*3+2,
      r:Math.random()*6+3,
      color:[color,"#c8f04a","#fff","#F0884A"][Math.floor(Math.random()*4)],
      rot:Math.random()*360
    });
  }
  var frame=0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.rot+=3;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
      ctx.restore();
    });
    frame++;
    if(frame<80) requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  animate();
}

// ══ EXPORT CSV ══
function exportCSV(){
  var h=lh();
  if(!h.length){toast("Sin datos para exportar");return;}
  var rows=["Fecha,Día,Ejercicio,Peso máx (kg),Todas las series"];
  h.forEach(function(sess){
    sess.exercises.forEach(function(ex){
      if(ex.weights&&ex.weights.length){
        rows.push([sess.date,sess.dayLabel,'"'+ex.name+'"',ex.maxWeight||"",'"'+ex.weights.join(" / ")+'"'].join(","));
      }
    });
  });
  var blob=new Blob([rows.join("\n")],{type:"text/csv"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="gym-log.csv";
  a.click();
}

function toast(msg){

  t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2500);
}


function markDone(di,ei){
  var current = appData[gk(di,ei,"done",0)];
  var newVal = !current;
  appData[gk(di,ei,"done",0)] = newVal;
  sd(appData);
  // Update circle number
  var num = document.getElementById("exn"+di+"_"+ei);
  if(num){
    num.textContent = newVal ? "✓" : (ei+1);
    num.className = "exn" + (newVal?" exndone":"");
  }
  // Update card
  var card = document.getElementById("exc"+di+"_"+ei);
  if(card) card.classList.toggle("alldone", newVal);
  updateProg(di);
  // Save session if all done
  var done = countDone(di);
  if(done===DAYS[di].exercises.length){
    saveSession(di);
    showConfetti(DAYS[di].color);
    var comp = document.getElementById("comp"+di);
    if(comp) comp.classList.add("show");
  }
}
